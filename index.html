<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" href="resources/css/styles.css">
    <title>TechStore</title>
</head>

<body>
    <div class="contenedorPrincipal">
        <header>
            <div class="degradado"></div>
            <div class="textoBienvenida">
                <img class="logo" src="./img/logo.png" alt="Logo de TechStore">
                <h1>TechStore</h1>
                <h2>Bienvenido a TechStore</h2>
                <br>
                <p>Descubre lo ultimo en tecnologia</p>
            </div>
        </header>

        <main>
            <div>
                <i class="fa-solid fa-user"></i>
                <button class="btn-login">Iniciar sesion</button>
            </div>
        
            <section class="categorias">
                <a href="#" class="item-cate">
                    <i class="fa-solid fa-laptop"></i>
                    <span>Laptops</span>
                    <img  class="imagenes" src="./img/laptop.png" alt="Laptop">
                    
                </a>

                <a href="#" class="item-cate">
                    <i class="fa-solid fa-gamepad"></i>
                    <span>Consolas</span>
                    <img src="./img/consolas.png" alt="Consola">
                    
                </a>

                <a href="#" class="item-cate">
                    <i class="fa-solid fa-computer-mouse"></i>
                    <span>Perifericos</span>
                    <img src="./img/perifericos.png" alt="Periferico">
                    
                </a>

                <a href="#" class="item-cate">
                    <i class="fa-solid fa-mobile-retro"></i> 
                    <span>Celulares</span>
                    <img src="./img/celulares.png" alt="Celular">
                   
                </a>

                <a href="#" class="item-cate">
                    <i class="fa-solid fa-headphones"></i>
                    <span>Audio</span>
                    <img src="./img/audio.png" alt="Audio">
                    
                </a>

                <a href="#" class="item-cate">
                    <i class="fa-solid fa-print"></i>
                    <span>Impresoras</span>
                    <img src="./img/impresoras.png" alt="Impresora">
                   
                </a>
            </section>
            <section class="resto">
            </section>
            
        </main>

    </div>
</body>

</html>
